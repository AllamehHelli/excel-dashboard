<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داشبورد مدیریتی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">گزارش عملکرد سالانه</h1>
        
        <!-- آپلود فایل -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <input type="file" id="upload" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
        </div>

        <!-- بخش نمودارها و جدول -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <canvas id="myChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md overflow-x-auto">
                <table id="dataTable" class="min-w-full divide-y divide-gray-200 text-right">
                    <!-- داده‌ها اینجا قرار می‌گیرند -->
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
